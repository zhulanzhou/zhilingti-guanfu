name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: 运行功能测试
        run: |
          guanfu --version
          guanfu --help
          guanfu divine --help
          guanfu see --help
          guanfu card --help
          guanfu emerge --help
          guanfu cycle --help
          guanfu list --help
          guanfu hexagram --help

      - name: 测试核心命令
        run: |
          guanfu divine
          guanfu see "如何面对不确定性"
          guanfu card
          guanfu emerge "人工智能"
          guanfu cycle "学会一门新技能"
          guanfu list
          guanfu hexagram 1
          guanfu hexagram 64
